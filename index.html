<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nightshade Films</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
:root{
--bg:#050505;
--text:white;
--card:#111;
}
.light-mode{
--bg:white;
--text:black;
--card:#eee;
}

body{
margin:0;
font-family:Poppins;
background:var(--bg);
color:var(--text);
}

/* HEADER */
header{
position:fixed;top:0;width:100%;
display:flex;justify-content:center;align-items:center;
padding:15px;
background:rgba(0,0,0,0.7);
z-index:1000;
}
.logo{position:absolute;left:20px}
.menu-toggle{display:none;position:absolute;right:20px;font-size:28px;cursor:pointer}

nav{display:flex;gap:25px}
nav a{color:var(--text);text-decoration:none;font-weight:600}

/* HERO */
.hero{
height:100vh;
margin-top:70px;
background-size:cover;
background-position:center;
position:relative;
}
.hero h1{
position:absolute;top:40px;left:50%;
transform:translateX(-50%);
font-size:3rem;
background:rgba(0,0,0,0.5);
padding:15px 25px;
border-radius:10px;
display:flex;flex-wrap:wrap;justify-content:center;
word-spacing:0.3em;
}
.hero h1 span{
display:inline-block;
animation:wave 2s infinite;
}
@keyframes wave{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-8px)}
}

/* SECTION */
section{padding:80px 20px}
h2{text-align:center;color:#ffcc00}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:10px;
}
.item{
position:relative;
overflow:hidden;
border-radius:10px;
}
.item img,.item video{
width:100%;height:180px;object-fit:cover;
}

/* CAPTION */
.caption{
position:absolute;bottom:5px;left:5px;
background:rgba(0,0,0,0.5);
padding:3px 6px;font-size:12px;
}

/* HEART */
.heart{
position:absolute;top:8px;right:8px;
width:24px;height:24px;
background:url('https://cdn-icons-png.flaticon.com/512/833/833472.png') center/cover;
cursor:pointer;
}
.heart.liked{animation:pop 0.5s}
@keyframes pop{50%{transform:scale(1.5)}}

/* LIGHTBOX */
.lightbox{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.9);
display:none;justify-content:center;align-items:center;
z-index:2000;
}
.lightbox img,.lightbox video{max-width:90%;max-height:90%}

/* FORM */
input,textarea,select{
width:100%;padding:10px;margin:5px 0;
background:var(--card);color:var(--text);border:none;
}
button{padding:10px;border:none;background:#ffcc00;color:black;cursor:pointer}

/* WHATSAPP */
.whatsapp{
position:fixed;bottom:20px;right:20px;
background:#25D366;color:white;
padding:10px 15px;border-radius:30px;
}

/* THEME */
.theme-btn{
position:fixed;bottom:20px;left:20px;
background:#ffcc00;color:black;
padding:10px;border-radius:20px;cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){
.menu-toggle{display:block}
nav{display:none;flex-direction:column;position:absolute;top:60px;width:100%;background:black}
nav.show{display:flex}
.hero{height:70vh}
.hero h1{font-size:1.5rem}
.gallery{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginBox" style="position:fixed;top:0;left:0;width:100%;height:100%;background:black;display:flex;justify-content:center;align-items:center;z-index:3000;">
<div style="background:#111;padding:30px;border-radius:10px;text-align:center;">
<h2>Admin Login</h2>
<input id="username" placeholder="Username"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>
<p id="error" style="color:red;"></p>
</div>
</div>

<header>
<div class="logo">Nightshade</div>
<div class="menu-toggle" onclick="toggleMenu()">☰</div>

<nav id="nav">
<a href="#home">Home</a>
<a href="#gallery">Gallery</a>
<a href="#booking">Booking</a>
</nav>
</header>

<section class="hero" id="home">
<h1 id="hero-text">Nightshade Films</h1>
</section>

<!-- ADMIN PANEL -->
<div id="adminPanel" style="display:none;padding:20px;text-align:center;">
<h3>Upload Media</h3>
<input type="file" id="fileInput">
<button onclick="logout()">Logout</button>
</div>

<!-- GALLERY -->
<section id="gallery">
<h2>Gallery</h2>
<div class="gallery" id="gallery"></div>
</section>

<!-- BOOKING -->
<section id="booking">
<h2>Book & Pay</h2>

<form onsubmit="startPayment(event)">
<input id="name" placeholder="Name" required>
<input id="date" type="date" required>

<select id="service">
<option value="Wedding - 15000">Wedding - KES 15,000</option>
<option value="Burial - 10000">Burial - KES 10,000</option>
<option value="Livestream - 8000">Livestream - KES 8,000</option>
</select>

<textarea id="details"></textarea>

<button>Proceed</button>
</form>

<div id="paymentBox" style="display:none;background:#111;padding:15px;margin-top:10px;border-radius:10px;">
<p>Send to: <b>254XXXXXXXXX</b></p>
<p>Amount: <span id="amount"></span></p>
<button onclick="confirmBooking()">I Have Paid</button>
</div>

</section>

<div class="theme-btn" onclick="toggleTheme()">🌗</div>

<a class="whatsapp" href="https://wa.me/254XXXXXXXXX">Chat</a>

<div class="lightbox" onclick="this.style.display='none'">
<img id="lightImg">
</div>

<script>

/* LOGIN */
const ADMIN_USER="admin";
const ADMIN_PASS="1234";

function login(){
if(username.value===ADMIN_USER && password.value===ADMIN_PASS){
localStorage.setItem("admin","true");
loginBox.style.display="none";
adminPanel.style.display="block";
}else{
error.innerText="Wrong details";
}
}

window.onload=function(){
if(localStorage.getItem("admin")==="true"){
loginBox.style.display="none";
adminPanel.style.display="block";
}
}

/* LOGOUT */
function logout(){
localStorage.removeItem("admin");
location.reload();
}

/* MENU */
function toggleMenu(){
nav.classList.toggle("show");
}

/* THEME */
function toggleTheme(){
document.body.classList.toggle("light-mode");
}

/* HERO TEXT */
let txt=hero-text.innerText;
hero-text.innerHTML="";
txt.split("").forEach((c,i)=>{
let s=document.createElement("span");
s.innerHTML=c===" "?"&nbsp;":c;
s.style.animationDelay=i*0.1+"s";
hero-text.appendChild(s);
});

/* HERO SLIDE */
let imgs=["https://res.cloudinary.com/drrratc4o/image/upload/f_auto,q_auto/85BBFC31-973D-4DD5-9D4A-B3D068532373_k8wrck"];
let i=0;
setInterval(()=>{
i=(i+1)%imgs.length;
document.querySelector(".hero").style.backgroundImage=`url('${imgs[i]}')`;
},4000);

/* GALLERY */
fileInput.onchange=e=>{
let file=e.target.files[0];
let url=URL.createObjectURL(file);

let div=document.createElement("div");
div.className="item";

if(file.type.startsWith("video")){
let v=document.createElement("video");
v.src=url;
v.muted=true;
v.loop=true;
v.onmouseenter=()=>v.play();
v.onmouseleave=()=>v.pause();
div.appendChild(v);
}else{
let img=document.createElement("img");
img.src=url;
img.onclick=()=>openLight(url);
div.appendChild(img);
}

let heart=document.createElement("div");
heart.className="heart";
heart.onclick=()=>heart.classList.toggle("liked");
div.appendChild(heart);

gallery.appendChild(div);
};

/* LIGHTBOX */
function openLight(src){
lightImg.src=src;
document.querySelector(".lightbox").style.display="flex";
}

/* MPESA */
function startPayment(e){
e.preventDefault();
let service=document.getElementById("service").value;
let amount=service.split("-")[1];
amount.innerText="KES "+amount;
paymentBox.style.display="block";
}

function confirmBooking(){
let msg=`Booking:%0AName:${name.value}%0AService:${service.value}`;
window.open(`https://wa.me/254XXXXXXXXX?text=${msg}`);
}

</script>

</body>
</html>
