<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nightshade Films</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #050505;
    color: white;
}

/* HEADER */
header {
    position: fixed;
    width: 100%;
    top: 0;
    background:
        linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
        url("YOUR_HEADER_BG_LINK") center/cover no-repeat;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    z-index: 1000;
    transition: 0.4s;
    backdrop-filter: blur(6px);
}

header.scrolled {
    background: rgba(0,0,0,0.95);
    padding: 10px 30px;
}

.logo img {
    height: 40px;
}

/* NAV */
nav {
    display: flex;
    gap: 30px;
}

nav a {
    position: relative;
    color: white;
    text-decoration: none;
    font-weight: 600;
}

nav a::after {
    content: "";
    position: absolute;
    width: 0%;
    height: 2px;
    background: #ffcc00;
    left: 0;
    bottom: -5px;
    transition: 0.3s;
}

nav a:hover::after {
    width: 100%;
}

nav a:hover {
    color: #ffcc00;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 70px;
    position: relative;
    overflow: hidden;
}

.hero::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background:
        linear-gradient(#0f0f0f, #1a1a1a),
        url('https://images.unsplash.com/photo-1526403221233-4c28d8d4f0bb') center/cover;
    top: -50%;
    left: -50%;
    z-index: -2;
}

/* PARTICLES */
.particles {
    position: absolute;
    width: 100%;
    height: 100%;
    z-index: -1;
}

.particle {
    position: absolute;
    background: rgba(255,204,0,0.4);
    border-radius: 50%;
    animation: float 10s linear infinite;
}

@keyframes float {
    0% {transform: translateY(0);}
    100% {transform: translateY(-400px);}
}

/* HERO TEXT */
.hero h1 {
    font-size: 50px;
    background: rgba(0,0,0,0.6);
    padding: 20px;
    border-radius: 10px;
    text-align: center;

    opacity: 0;
    transform: translateY(20px);
    animation: fadeHero 1.5s forwards;
}

@keyframes fadeHero {
    to {
        opacity: 1;
        transform: translateY(0);
        text-shadow: 0 0 10px #ffcc00;
    }
}

/* SECTIONS */
section {
    padding: 80px 20px;
}

section:nth-child(even) {
    background: #111;
}

h2 {
    text-align: center;
    color: #ffcc00;
}

/* GALLERY */
.insta-gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px,1fr));
    gap: 10px;
}

.insta-item img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 8px;
    transition: 0.3s;
}

.insta-item:hover img {
    transform: scale(1.05);
}

.caption {
    margin-top: 5px;
    background: rgba(0,0,0,0.6);
    padding: 3px 6px;
    border-radius: 4px;
    color: #ffcc00;

    opacity: 0;
    transform: translateY(10px);
    transition: 0.5s;
}

.insta-item.show .caption {
    opacity: 1;
    transform: translateY(0);
}

/* BUTTON */
.btn {
    border: 1px solid #ffcc00;
    background: transparent;
    color: #ffcc00;
    padding: 10px;
    border-radius: 8px;
}

.btn:hover {
    background: #ffcc00;
    color: black;
}

/* FORM */
input, textarea {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    background: #111;
    border: none;
    color: white;
}

/* WHATSAPP */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: green;
    padding: 15px;
    border-radius: 50%;
}

/* ANIMATIONS */
.fade {
    opacity: 0;
    transform: translateY(20px);
    transition: 1s;
}

.show {
    opacity: 1;
    transform: translateY(0);
}
</style>
</head>

<body>

<header id="header">
    <div class="logo">
        <img src="YOUR_LOGO_LINK">
    </div>
    <nav>
        <a href="#home">Home</a>
        <a href="#gallery">Gallery</a>
        <a href="#booking">Booking</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section id="home" class="hero">
    <div class="particles"></div>
    <h1>Behind every glossy shot is a tale of grit, grind 🩶</h1>
</section>

<section class="fade">
<h2>About</h2>
<p>We capture powerful church moments and cinematic experiences.</p>
</section>

<section id="gallery" class="fade">
<h2>Gallery</h2>
<div class="insta-gallery">

<div class="insta-item">
<img src="YOUR_IMAGE_LINK">
<div class="caption">Wedding</div>
</div>

</div>
</section>

<section id="booking" class="fade">
<h2>Book</h2>
<form onsubmit="sendWhatsApp(event)">
<input id="name" placeholder="Name" required>
<input id="date" type="date">
<textarea id="details"></textarea>
<button class="btn">Send</button>
</form>
</section>

<section id="contact">
<h2>Contact</h2>
<p>Email: your@email.com</p>
</section>

<a class="whatsapp" href="https://wa.me/YOUR_WHATSAPP_NUMBER">Chat</a>

<script>
// HEADER SCROLL
window.addEventListener("scroll",()=>{
document.getElementById("header").classList.toggle("scrolled", window.scrollY>50);
});

// PARTICLES
const container=document.querySelector(".particles");
for(let i=0;i<40;i++){
let p=document.createElement("div");
p.classList.add("particle");
p.style.left=Math.random()*100+"%";
p.style.width=p.style.height=(Math.random()*4+2)+"px";
p.style.animationDuration=(Math.random()*10+5)+"s";
container.appendChild(p);
}

// FADE
window.addEventListener("scroll",()=>{
document.querySelectorAll(".fade").forEach(el=>{
if(el.getBoundingClientRect().top<window.innerHeight-100){
el.classList.add("show");
}
});
document.querySelectorAll(".insta-item").forEach(el=>{
if(el.getBoundingClientRect().top<window.innerHeight-50){
el.classList.add("show");
}
});
});

// WHATSAPP
function sendWhatsApp(e){
e.preventDefault();
let msg=`Booking:%0AName:${name.value}%0ADate:${date.value}%0ADetails:${details.value}`;
window.open(`https://wa.me/YOUR_WHATSAPP_NUMBER?text=${msg}`);
}
</script>

</body>
</html>
